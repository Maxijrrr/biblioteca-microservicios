spring.application.name=ms-prestamos
server.port=8087

# Configuracion de base de datos (variables de entorno para Docker)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://db-prestamos:3306/db_prestamos?useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Feign Client - URLs de microservicios dependientes (variables de entorno para Docker)
perfiles.service.url=${PERFILES_URL:http://ms-perfiles:8086}
inventario.service.url=${INVENTARIO_URL:http://ms-inventario:8084}

# Timeouts Feign Client
spring.cloud.openfeign.client.config.default.connectTimeout=3000
spring.cloud.openfeign.client.config.default.readTimeout=5000

logging.level.cl.duoc.ms_prestamos=INFO
